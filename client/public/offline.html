<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0f11" />
    <title>Razon offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d0f11;
        color: #eef4ef;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #26302e;
        border-radius: 8px;
        background: #15191b;
        padding: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #aab5b1;
        line-height: 1.5;
      }

      strong {
        color: #ff9b9b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Razon offline</h1>
      <p>
        Le cockpit est disponible en mode application, mais les donnees de marche
        doivent etre reconnectees. <strong>Aucun ordre reel n'est envoye.</strong>
      </p>
    </main>
  </body>
</html>
